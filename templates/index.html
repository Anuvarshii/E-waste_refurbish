<!DOCTYPE html>
<html>
<head>
    <title>E-Waste Refurbishment Predictor</title>
</head>
<body>
    <h2>E-Waste Refurbishment Prediction</h2>

    <form action="/predict" method="post" enctype="multipart/form-data">

    <label>Upload Phone Image:</label><br>
    <input type="file" name="image" required><br><br>

    <label>Brand:</label><br>
    <input type="text" name="brand" required><br><br>

    <label>Device Age (years):</label><br>
    <input type="number" step="0.1" name="age" required><br><br>

    <label>Battery Health (%):</label><br>
    <input type="number" name="battery" required><br><br>

    <label>Working Condition (0-10):</label><br>
    <input type="number" name="working" min="0" max="10" required><br><br>

    <button type="submit">Predict</button>
</form>
</body>
</html>
